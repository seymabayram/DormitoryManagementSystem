<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" width="120" height="200">
  <!-- Hair (back) -->
  <ellipse cx="60" cy="62" rx="30" ry="34" fill="#3D2314"/>
  <!-- Neck -->
  <rect x="52" y="102" width="16" height="18" rx="4" fill="#F2C08A"/>
  <!-- Body / Blue Coat -->
  <rect x="32" y="118" width="56" height="62" rx="14" fill="#3A6BC7"/>
  <!-- Collar -->
  <rect x="50" y="118" width="20" height="12" rx="4" fill="#5B8FEE"/>
  <!-- Left Arm -->
  <rect x="20" y="120" width="16" height="42" rx="8" fill="#3A6BC7"/>
  <!-- Right Arm -->
  <rect x="84" y="120" width="16" height="42" rx="8" fill="#3A6BC7"/>
  <!-- Left Hand -->
  <circle cx="28" cy="164" r="8" fill="#F2C08A"/>
  <!-- Right Hand -->
  <circle cx="92" cy="164" r="8" fill="#F2C08A"/>
  <!-- Head -->
  <ellipse cx="60" cy="72" rx="28" ry="30" fill="#F2C08A"/>
  <!-- Hair (front top) -->
  <ellipse cx="60" cy="48" rx="28" ry="16" fill="#3D2314"/>
  <!-- Hair side left -->
  <ellipse cx="33" cy="68" rx="8" ry="18" fill="#3D2314"/>
  <!-- Hair side right -->
  <ellipse cx="87" cy="68" rx="8" ry="18" fill="#3D2314"/>
  <!-- Pink Hair Band -->
  <rect x="34" y="52" width="52" height="9" rx="4.5" fill="#FF6B9D"/>
  <!-- Eyes -->
  <ellipse cx="50" cy="74" rx="5" ry="6" fill="white"/>
  <ellipse cx="70" cy="74" rx="5" ry="6" fill="white"/>
  <circle cx="51" cy="75" r="3.5" fill="#3D2314"/>
  <circle cx="71" cy="75" r="3.5" fill="#3D2314"/>
  <!-- Eye shine -->
  <circle cx="52.5" cy="73.5" r="1.2" fill="white"/>
  <circle cx="72.5" cy="73.5" r="1.2" fill="white"/>
  <!-- Eyebrows -->
  <path d="M45 68 Q50 65 55 68" stroke="#3D2314" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M65 68 Q70 65 75 68" stroke="#3D2314" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M50 86 Q60 95 70 86" stroke="#C07860" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="43" cy="83" rx="6" ry="4" fill="#FFB3C1" opacity="0.6"/>
  <ellipse cx="77" cy="83" rx="6" ry="4" fill="#FFB3C1" opacity="0.6"/>
  <!-- Legs -->
  <rect x="42" y="178" width="14" height="20" rx="7" fill="#2D2D6B"/>
  <rect x="64" y="178" width="14" height="20" rx="7" fill="#2D2D6B"/>
  <!-- Shoes -->
  <ellipse cx="49" cy="199" rx="9" ry="5" fill="#1A0E08"/>
  <ellipse cx="71" cy="199" rx="9" ry="5" fill="#1A0E08"/>
</svg>
